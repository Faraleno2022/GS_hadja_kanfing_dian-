<!-- Template de chargement optimisé pour les vues lourdes -->
<div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Chargement...</span>
        </div>
        <p class="loading-text mt-3">Chargement en cours...</p>
        <div class="progress mt-2" style="width: 200px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated" 
                 role="progressbar" style="width: 0%" id="loading-progress"></div>
        </div>
    </div>
</div>

<style>
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    backdrop-filter: blur(2px);
}

.loading-spinner {
    text-align: center;
    background: white;
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.loading-text {
    color: #6c757d;
    font-size: 0.9rem;
}

/* Animation de pulsation pour le texte */
@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
}

.loading-text {
    animation: pulse 1.5s ease-in-out infinite;
}
</style>

<script>
// Script de gestion du loading optimisé
document.addEventListener('DOMContentLoaded', function() {
    const loadingOverlay = document.getElementById('loading-overlay');
    const progressBar = document.getElementById('loading-progress');
    
    // Simuler le progrès de chargement
    let progress = 0;
    const progressInterval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress > 90) progress = 90; // Ne pas aller à 100% avant la fin réelle
        
        progressBar.style.width = progress + '%';
        
        if (progress >= 90) {
            clearInterval(progressInterval);
        }
    }, 200);
    
    // Masquer le loading quand la page est complètement chargée
    window.addEventListener('load', function() {
        progressBar.style.width = '100%';
        setTimeout(() => {
            loadingOverlay.style.opacity = '0';
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
            }, 300);
        }, 500);
    });
    
    // Masquer le loading après un délai maximum (fallback)
    setTimeout(() => {
        if (loadingOverlay.style.display !== 'none') {
            progressBar.style.width = '100%';
            loadingOverlay.style.opacity = '0';
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
            }, 300);
        }
    }, 10000); // 10 secondes maximum
});

// Fonction pour afficher le loading lors des requêtes AJAX
function showLoading(text = 'Chargement...') {
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.querySelector('.loading-text');
    
    if (loadingText) loadingText.textContent = text;
    if (loadingOverlay) {
        loadingOverlay.style.display = 'flex';
        loadingOverlay.style.opacity = '1';
    }
}

// Fonction pour masquer le loading
function hideLoading() {
    const loadingOverlay = document.getElementById('loading-overlay');
    if (loadingOverlay) {
        loadingOverlay.style.opacity = '0';
        setTimeout(() => {
            loadingOverlay.style.display = 'none';
        }, 300);
    }
}

// Intercepter les formulaires pour afficher le loading
document.addEventListener('submit', function(e) {
    const form = e.target;
    if (form.tagName === 'FORM' && !form.classList.contains('no-loading')) {
        showLoading('Traitement en cours...');
    }
});

// Intercepter les liens pour afficher le loading
document.addEventListener('click', function(e) {
    const link = e.target.closest('a');
    if (link && !link.classList.contains('no-loading') && 
        !link.href.includes('#') && !link.href.includes('javascript:')) {
        showLoading('Navigation en cours...');
    }
});
</script>
