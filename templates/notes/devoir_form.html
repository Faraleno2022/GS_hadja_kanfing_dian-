{% extends 'base.html' %}
{% block title %}Nouveau devoir{% endblock %}

{% block content %}
<div class="container-fluid py-3">
    <h2 class="mb-3"><i class="fas fa-plus text-primary me-2"></i>Nouveau devoir</h2>

    <div class="card">
        <div class="card-body">
            <form method="get" class="mb-3">
                <label class="form-label">Classe</label>
                <select name="classe_id" class="form-select" onchange="this.form.submit()">
                    <option value="">— Choisir la classe —</option>
                    {% for c in classes %}
                    <option value="{{ c.id }}" {% if classe_id == c.id|stringformat:"s" %}selected{% endif %}>{{ c.nom }}</option>
                    {% endfor %}
                </select>
            </form>

            {% if classe %}
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="classe_id" value="{{ classe.id }}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Matière *</label>
                        <select name="matiere_id" class="form-select" required>
                            <option value="">— Choisir —</option>
                            {% for m in matieres %}<option value="{{ m.id }}">{{ m.nom }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Titre du devoir *</label>
                        <input type="text" name="titre" class="form-control" required placeholder="Ex: Exercices page 42">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Date où le devoir est donné</label>
                        <input type="date" name="date_donne" class="form-control" value="{{ today|date:'Y-m-d' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Date de remise (échéance)</label>
                        <input type="date" name="date_remise" class="form-control" value="{{ today|date:'Y-m-d' }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Consigne / description (optionnel)</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="mt-3 text-end">
                    <a href="{% url 'notes:liste_devoirs' %}?classe_id={{ classe.id }}" class="btn btn-outline-secondary">Annuler</a>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Créer et suivre</button>
                </div>
            </form>
            {% else %}
            <div class="alert alert-secondary mb-0">Choisissez d'abord une classe.</div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
